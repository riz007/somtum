<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Somtum — Memory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #0c0a07;
        --surface:   #111009;
        --surface2:  #19160e;
        --surface3:  #201d13;
        --border:    #2d2918;
        --border2:   #3e3920;
        --text:      #ede8da;
        --muted:     #6b6350;
        --muted2:    #9e9278;
        --accent:    #f0a030;
        --accent-g:  #34d399;
        --accent-a:  #f0a030;
        --accent-r:  #e8685a;
        --accent-v:  #a78bfa;
        --accent-c:  #38bdf8;
        --radius:    7px;
        --sidebar:   304px;
        --header:    52px;
      }

      html, body {
        height: 100%; overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* Grain overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.022;
        background-size: 180px 180px;
      }

      /* ── Scrollbars ── */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

      .mono { font-family: 'Fira Code', monospace; }

      /* ══ HEADER ══════════════════════════════════════════════════════ */
      #header {
        height: var(--header);
        padding: 0 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: relative;
      }
      /* accent line under header */
      #header::after {
        content: '';
        position: absolute;
        bottom: -1px; left: 0;
        width: 100%; height: 1px;
        background: linear-gradient(90deg, var(--accent) 0%, transparent 40%);
        opacity: 0.35;
      }

      #logo {
        font-size: 17px;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: -0.02em;
        line-height: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      #logo-mark {
        width: 28px; height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent) 0%, #e07820 100%);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 0 16px rgba(240,160,48,0.3);
      }
      #logo-mark svg { width: 14px; height: 14px; color: #0c0a07; }

      #header-sep { width: 1px; height: 18px; background: var(--border2); }

      #project-label {
        font-size: 11px;
        color: var(--muted);
        font-family: 'Fira Code', monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 3px 8px;
        border-radius: 4px;
      }

      #stat-bar { display: flex; gap: 4px; margin-left: auto; }
      .stat-pill {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 10px;
        border-radius: 5px;
        background: var(--surface2);
        border: 1px solid var(--border);
        cursor: default;
        transition: border-color 0.15s;
      }
      .stat-pill:hover { border-color: var(--border2); }
      .stat-pill .s-lbl {
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.1em;
        color: var(--muted);
      }
      .stat-pill .s-val {
        font-family: 'Fira Code', monospace;
        font-size: 12.5px; font-weight: 500;
      }

      /* ══ LAYOUT ══════════════════════════════════════════════════════ */
      #layout {
        display: flex;
        height: calc(100vh - var(--header));
        overflow: hidden;
      }

      /* ══ SIDEBAR ══════════════════════════════════════════════════════ */
      #sidebar {
        width: var(--sidebar);
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--surface);
      }

      /* Search */
      #search-wrap {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        display: flex; flex-direction: column; gap: 8px;
        background: var(--bg);
      }
      .search-box { position: relative; }
      .search-box svg {
        position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
        width: 13px; height: 13px; color: var(--muted); pointer-events: none;
      }
      #search-input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        padding: 7px 9px 7px 28px;
        font-size: 12.5px;
        font-family: 'Fira Code', monospace;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      #search-input::placeholder { color: var(--muted); }
      #search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(240,160,48,0.1);
      }
      #search-meta {
        display: flex; align-items: center; justify-content: space-between;
      }
      .strat-row { display: flex; gap: 3px; }
      .strat-btn {
        padding: 3px 8px;
        font-size: 10px; font-weight: 600;
        border: 1px solid var(--border2); border-radius: 4px;
        cursor: pointer;
        background: var(--surface2); color: var(--muted2);
        transition: all 0.12s;
        font-family: 'Syne', sans-serif;
        letter-spacing: 0.03em;
      }
      .strat-btn:hover { color: var(--text); border-color: var(--muted); }
      .strat-btn.active {
        background: rgba(240,160,48,0.1);
        border-color: rgba(240,160,48,0.4);
        color: var(--accent);
      }
      #search-spinner { display: none; }
      #search-spinner svg { animation: spin 0.7s linear infinite; display: block; }

      /* Kind filters */
      #kind-filters {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        display: flex; flex-wrap: wrap; gap: 3px;
        flex-shrink: 0;
      }
      .kind-tag {
        padding: 2px 8px; font-size: 10px; font-weight: 700;
        border-radius: 4px; border: 1px solid transparent;
        cursor: pointer; transition: all 0.12s;
        color: var(--muted2); background: var(--surface2);
        letter-spacing: 0.04em;
      }
      .kind-tag:hover { color: var(--text); border-color: var(--border2); }
      .kind-tag.active { color: #fff; }

      /* List header */
      #list-header {
        padding: 5px 10px 5px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }
      #list-header .h-label {
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.12em;
        color: var(--muted);
      }
      #list-count {
        font-size: 10px; font-family: 'Fira Code', monospace; color: var(--muted);
      }

      /* Memory list */
      #memory-list {
        flex: 1; overflow-y: auto;
        padding: 6px;
        display: flex; flex-direction: column; gap: 2px;
      }

      /* Memory card */
      .mem-card {
        padding: 10px 10px 8px;
        border-radius: 6px;
        background: var(--surface2);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: border-color 0.12s, background 0.12s, transform 0.1s;
        position: relative;
        overflow: hidden;
      }
      /* kind color bar on left */
      .mem-card::before {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 2.5px;
        border-radius: 6px 0 0 6px;
        background: var(--card-accent, var(--muted));
        opacity: 0.6;
        transition: opacity 0.12s;
      }
      .mem-card:hover {
        border-color: var(--border2);
        background: var(--surface3);
      }
      .mem-card:hover::before { opacity: 1; }
      .mem-card.selected {
        border-color: var(--accent);
        background: rgba(240,160,48,0.04);
      }
      .mem-card.selected::before { background: var(--accent); opacity: 1; }

      .mc-head {
        display: flex; align-items: flex-start; gap: 6px;
        margin-bottom: 4px;
      }
      .mc-title {
        font-size: 12.5px; font-weight: 600; color: var(--text);
        line-height: 1.35; flex: 1; min-width: 0;
      }
      .mc-kind {
        flex-shrink: 0;
        font-size: 8.5px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.1em;
        padding: 2px 6px; border-radius: 3px;
      }
      .mc-body {
        font-size: 11px; color: var(--muted2);
        line-height: 1.45;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .mc-footer {
        display: flex; align-items: center; gap: 5px; margin-top: 6px;
      }
      .mc-time {
        font-size: 9.5px; color: var(--muted);
        font-family: 'Fira Code', monospace;
      }
      .mc-tags { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; }
      .mc-tag {
        font-size: 9px; font-weight: 600;
        padding: 1px 5px;
        background: var(--surface3);
        border: 1px solid var(--border2);
        border-radius: 3px; color: var(--muted);
        font-family: 'Fira Code', monospace;
      }
      .mc-forget {
        display: none;
        width: 20px; height: 20px;
        align-items: center; justify-content: center;
        border-radius: 4px; cursor: pointer;
        background: rgba(232,104,90,0.08);
        border: 1px solid rgba(232,104,90,0.2);
        color: var(--accent-r);
        font-size: 13px; font-weight: 300;
        transition: background 0.12s;
        flex-shrink: 0;
        position: absolute; top: 7px; right: 7px;
        line-height: 1;
      }
      .mem-card:hover .mc-forget { display: flex; }
      .mc-forget:hover { background: rgba(232,104,90,0.2); }

      /* ══ MAIN ══════════════════════════════════════════════════════════ */
      #main {
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden; min-width: 0;
      }

      /* Tab bar */
      #tab-bar {
        height: 40px;
        padding: 0 14px;
        display: flex; align-items: center; flex-shrink: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        gap: 0;
      }
      .tab-btn {
        padding: 0 14px;
        height: 100%;
        font-size: 11.5px; font-weight: 600;
        color: var(--muted2);
        border: none;
        background: none;
        cursor: pointer;
        transition: color 0.12s;
        position: relative;
        font-family: 'Syne', sans-serif;
        letter-spacing: 0.04em;
      }
      .tab-btn::after {
        content: '';
        position: absolute;
        bottom: 0; left: 14px; right: 14px;
        height: 2px;
        background: var(--accent);
        border-radius: 2px 2px 0 0;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .tab-btn:hover { color: var(--text); }
      .tab-btn.active { color: var(--accent); }
      .tab-btn.active::after { opacity: 1; }
      #tab-hint {
        margin-left: auto;
        font-size: 10px; color: var(--muted);
        font-family: 'Fira Code', monospace;
        padding-right: 4px;
      }

      /* Tab panes */
      #tab-graph { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      #tab-analytics { display: none; flex: 1; overflow-y: auto; padding: 14px; }

      /* Graph */
      #graph-container {
        flex: 1;
        margin: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #09080500;
        overflow: hidden;
        position: relative;
      }
      /* ambient glow behind graph */
      #graph-container::before {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 400px; height: 300px;
        transform: translate(-50%, -50%);
        background: radial-gradient(ellipse, rgba(240,160,48,0.04) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* Detail panel */
      #detail-panel {
        display: none;
        border-top: 1px solid var(--border);
        background: var(--surface);
        overflow-y: auto; flex-shrink: 0;
        max-height: 36vh;
        animation: slideUp 0.18s ease forwards;
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      #detail-inner { padding: 16px 20px; }
      .detail-head {
        display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px;
      }
      .detail-title {
        font-size: 15px; font-weight: 700; color: var(--text);
        flex: 1; line-height: 1.3;
      }
      .detail-meta {
        display: flex; gap: 16px; margin-bottom: 12px;
        font-size: 10.5px; color: var(--muted);
        font-family: 'Fira Code', monospace;
      }
      .detail-body {
        font-size: 12.5px; color: var(--muted2);
        line-height: 1.7; white-space: pre-wrap; word-break: break-word;
        margin-bottom: 12px;
      }
      .detail-chips { display: flex; flex-wrap: wrap; gap: 5px; }
      .detail-chip {
        font-size: 10px; font-weight: 500;
        padding: 2px 8px; border-radius: 4px;
        background: var(--surface2); border: 1px solid var(--border2);
        color: var(--muted2);
        font-family: 'Fira Code', monospace;
      }
      .detail-chip.file {
        color: var(--accent-c); border-color: rgba(56,189,248,0.3);
        background: rgba(56,189,248,0.06);
      }
      .detail-close {
        width: 24px; height: 24px; border-radius: 5px;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: var(--surface2); border: 1px solid var(--border);
        cursor: pointer; color: var(--muted2);
        transition: color 0.12s, border-color 0.12s;
      }
      .detail-close:hover { color: var(--text); border-color: var(--border2); }

      /* Analytics */
      .a-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      }
      @media (max-width: 900px) { .a-grid { grid-template-columns: 1fr; } }
      .a-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
      }
      .a-title {
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.14em;
        color: var(--muted); margin-bottom: 14px;
      }
      .bar-row {
        display: flex; align-items: center; gap: 8px; margin-bottom: 9px;
      }
      .bar-label {
        font-size: 11.5px; font-weight: 600;
        width: 100px; flex-shrink: 0;
      }
      .bar-track {
        flex: 1; height: 3px;
        background: var(--surface3); border-radius: 2px; overflow: hidden;
      }
      .bar-fill {
        height: 100%; border-radius: 2px;
        width: 0; transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
      }
      .bar-count {
        font-size: 11px; font-family: 'Fira Code', monospace;
        color: var(--muted2); width: 36px; text-align: right; flex-shrink: 0;
      }
      .cache-stat {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 0; border-bottom: 1px solid var(--border);
      }
      .cache-stat:last-child { border-bottom: none; }
      .cache-stat-lbl { font-size: 12px; color: var(--muted2); }
      .cache-stat-val { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 500; }
      .file-row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 0; border-bottom: 1px solid var(--border);
      }
      .file-row:last-child { border-bottom: none; }
      .file-name {
        font-size: 11px; font-family: 'Fira Code', monospace;
        color: var(--text); flex: 1;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
      }
      .file-count {
        font-size: 11px; font-family: 'Fira Code', monospace;
        color: var(--muted2); flex-shrink: 0;
      }

      /* Empty state */
      .empty {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 8px;
        padding: 48px 24px; color: var(--muted); text-align: center;
      }
      .empty-icon { opacity: 0.2; margin-bottom: 4px; }
      .empty-title { font-size: 13px; font-weight: 600; color: var(--muted2); }
      .empty-sub {
        font-size: 11.5px; color: var(--muted);
        max-width: 220px; line-height: 1.55;
      }

      /* Skeleton */
      .skel {
        background: var(--surface2); border-radius: 5px;
        animation: shimmer 1.8s ease-in-out infinite;
      }

      /* ── Animations ── */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes shimmer {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 0.6; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(3px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fadeIn 0.14s ease forwards; }

      /* ── Kind colour map ── */
      .kind-decision   { background: rgba(79,141,255,0.12);  color: #6ba3ff; }
      .kind-learning   { background: rgba(167,139,250,0.12); color: #a78bfa; }
      .kind-bugfix     { background: rgba(232,104,90,0.12);  color: #e8685a; }
      .kind-command    { background: rgba(240,160,48,0.12);  color: #f0a030; }
      .kind-file_summary { background: rgba(56,189,248,0.1); color: #38bdf8; }
      .kind-other      { background: rgba(107,99,80,0.15);   color: #9e9278; }

      .kf-decision   { border-color: rgba(79,141,255,0.3);  background: rgba(79,141,255,0.07);  color: #6ba3ff; }
      .kf-learning   { border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.07); color: #a78bfa; }
      .kf-bugfix     { border-color: rgba(232,104,90,0.3);  background: rgba(232,104,90,0.07);  color: #e8685a; }
      .kf-command    { border-color: rgba(240,160,48,0.3);  background: rgba(240,160,48,0.07);  color: #f0a030; }
      .kf-file_summary { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.06); color: #38bdf8; }
      .kf-other      { border-color: rgba(107,99,80,0.3);   background: rgba(107,99,80,0.07);   color: #9e9278; }
      .kf-all        { border-color: rgba(240,160,48,0.35); background: rgba(240,160,48,0.08);  color: #f0a030; }
    </style>
  </head>
  <body>
    <!-- ═══ HEADER ══════════════════════════════════════════════════════ -->
    <header id="header">
      <div id="logo">
        <div id="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46L7 19M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46l.04-.54" />
          </svg>
        </div>
        somtum
      </div>
      <div id="header-sep"></div>
      <span id="project-label">—</span>
      <div id="stat-bar">
        <div class="stat-pill">
          <span class="s-lbl">Memories</span>
          <span id="s-mem" class="s-val" style="color:var(--accent-g)">—</span>
        </div>
        <div class="stat-pill">
          <span class="s-lbl">Saved</span>
          <span id="s-saved" class="s-val" style="color:var(--accent)">—</span>
        </div>
        <div class="stat-pill">
          <span class="s-lbl">Spent</span>
          <span id="s-spent" class="s-val" style="color:var(--muted2)">—</span>
        </div>
        <div class="stat-pill">
          <span class="s-lbl">ROI</span>
          <span id="s-roi" class="s-val" style="color:var(--accent-v)">—</span>
        </div>
        <div class="stat-pill">
          <span class="s-lbl">Cache</span>
          <span id="s-cache" class="s-val" style="color:var(--accent-c)">—</span>
        </div>
      </div>
    </header>

    <!-- ═══ LAYOUT ══════════════════════════════════════════════════════ -->
    <div id="layout">
      <!-- ─── SIDEBAR ─────────────────────────────────────────────────── -->
      <aside id="sidebar">
        <div id="search-wrap">
          <div class="search-box">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5" stroke-linecap="round"/>
            </svg>
            <input id="search-input" type="text" placeholder="Search memories…" autocomplete="off" spellcheck="false" />
          </div>
          <div id="search-meta">
            <div class="strat-row" id="strategy-btns"></div>
            <div id="search-spinner">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
            </div>
          </div>
        </div>

        <div id="kind-filters"></div>

        <div id="list-header">
          <span class="h-label">Memories</span>
          <span id="list-count"></span>
        </div>

        <div id="memory-list">
          <div class="skel" style="height:66px;border-radius:6px"></div>
          <div class="skel" style="height:54px;border-radius:6px;margin-top:2px"></div>
          <div class="skel" style="height:70px;border-radius:6px;margin-top:2px"></div>
        </div>
      </aside>

      <!-- ─── MAIN ─────────────────────────────────────────────────────── -->
      <main id="main">
        <div id="tab-bar">
          <button class="tab-btn active" data-tab="graph">Graph</button>
          <button class="tab-btn" data-tab="analytics">Analytics</button>
          <span id="tab-hint"></span>
        </div>

        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
          <div id="tab-graph">
            <div id="graph-container"></div>
          </div>
          <div id="tab-analytics">
            <div class="a-grid" id="analytics-grid">
              <div class="skel" style="height:180px"></div>
              <div class="skel" style="height:180px"></div>
              <div class="skel" style="height:200px"></div>
              <div class="skel" style="height:200px"></div>
            </div>
          </div>
        </div>

        <div id="detail-panel">
          <div id="detail-inner"></div>
        </div>
      </main>
    </div>

    <script>
      // ─── State ───────────────────────────────────────────────────────────────────
      const S = {
        data: null, fullStats: null, activeTab: 'graph',
        activeKind: 'all', selectedId: null, searchQuery: '',
        searchResults: null, strategy: 'bm25', debounce: null,
        network: null, analyticsRendered: false,
      };

      // ─── Kind colours (vis-network nodes) ────────────────────────────────────────
      const KIND_COLOR = {
        decision:     { bg: '#6ba3ff', border: '#4f8dff' },
        learning:     { bg: '#a78bfa', border: '#8b6fe8' },
        bugfix:       { bg: '#e8685a', border: '#d04838' },
        command:      { bg: '#f0a030', border: '#d48020' },
        file_summary: { bg: '#38bdf8', border: '#1aa8e8' },
        other:        { bg: '#6b6350', border: '#504c3c' },
      };

      // ─── Utilities ────────────────────────────────────────────────────────────────
      function fmtK(n) {
        if (n === undefined || n === null) return '—';
        if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'k';
        return String(n);
      }

      function relTime(ts) {
        if (!ts) return '';
        const d = Date.now() - new Date(ts).getTime();
        const min = Math.floor(d / 60000);
        if (min < 1) return 'just now';
        if (min < 60) return `${min}m ago`;
        const hr = Math.floor(min / 60);
        if (hr < 24) return `${hr}h ago`;
        return `${Math.floor(hr / 24)}d ago`;
      }

      function kindClass(k) { return 'kind-' + (k || 'other').replace(/[^a-z_]/g, ''); }

      function h(tag, attrs, ...children) {
        const el = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs || {})) {
          if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
          else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
          else el.setAttribute(k, v);
        }
        for (const c of children.flat()) {
          if (c == null) continue;
          el.append(typeof c === 'string' ? c : c);
        }
        return el;
      }

      // ─── Boot ─────────────────────────────────────────────────────────────────────
      async function boot() {
        buildStrategyBtns();
        buildKindFilters([]);
        bindTabs();
        try {
          const res = await fetch('/api/data');
          S.data = await res.json();
          applyData();
        } catch (e) {
          document.getElementById('memory-list').innerHTML =
            '<div class="empty"><div class="empty-title">Could not load data</div>' +
            '<div class="empty-sub">' + e.message + '</div></div>';
        }
      }

      function applyData() {
        const { stats, memories, graph } = S.data;
        document.getElementById('project-label').textContent = stats.projectId;
        const saved = stats.tokensSaved ?? 0;
        const spent = stats.tokensSpent ?? 0;
        const roi = spent > 0 ? (saved / spent).toFixed(1) + 'x' : '—';
        document.getElementById('s-mem').textContent = fmtK(stats.memories);
        document.getElementById('s-saved').textContent = fmtK(saved);
        document.getElementById('s-spent').textContent = fmtK(spent);
        document.getElementById('s-roi').textContent = roi;
        document.getElementById('s-cache').textContent = '—';
        buildKindFilters(memories);
        renderList(memories);
        buildGraph(graph);
        loadFullStats();
      }

      // ─── Strategy buttons ─────────────────────────────────────────────────────────
      function buildStrategyBtns() {
        const wrap = document.getElementById('strategy-btns');
        ['bm25', 'hybrid', 'embeddings'].forEach((s) => {
          const btn = h('button', {
            class: 'strat-btn' + (s === S.strategy ? ' active' : ''),
            onclick: () => {
              S.strategy = s;
              wrap.querySelectorAll('.strat-btn').forEach((b) => b.classList.remove('active'));
              btn.classList.add('active');
              if (S.searchQuery) runSearch(S.searchQuery);
            },
          }, s);
          wrap.append(btn);
        });
      }

      // ─── Kind filter chips ────────────────────────────────────────────────────────
      const KIND_ORDER = ['all','decision','learning','bugfix','command','file_summary','other'];

      function buildKindFilters(memories) {
        const wrap = document.getElementById('kind-filters');
        wrap.innerHTML = '';
        const counts = {};
        memories.forEach((m) => { counts[m.kind] = (counts[m.kind] || 0) + 1; });
        const kinds = ['all', ...Object.keys(counts).sort((a, b) => KIND_ORDER.indexOf(a) - KIND_ORDER.indexOf(b))];
        kinds.forEach((k) => {
          const isAll = k === 'all';
          const label = isAll ? 'All' : k.replace('_', ' ');
          const count = isAll ? memories.length : counts[k] || 0;
          const btn = h('div', {
            class: 'kind-tag' + (S.activeKind === k ? ' active kf-' + k : ''),
            onclick: () => {
              S.activeKind = k;
              wrap.querySelectorAll('.kind-tag').forEach((b) => { b.className = 'kind-tag'; });
              btn.className = 'kind-tag active kf-' + k;
              renderList(S.searchResults ?? S.data?.memories ?? []);
            },
          }, label + (count > 0 ? ' ' + count : ''));
          wrap.append(btn);
        });
      }

      // ─── Memory list ──────────────────────────────────────────────────────────────
      function renderList(memories) {
        const list = document.getElementById('memory-list');
        const filtered = S.activeKind === 'all' ? memories : memories.filter((m) => m.kind === S.activeKind);
        document.getElementById('list-count').textContent =
          filtered.length !== memories.length
            ? filtered.length + ' / ' + memories.length
            : memories.length.toString();

        if (filtered.length === 0) {
          list.innerHTML = '';
          list.append(h('div', { class: 'empty' },
            h('div', { class: 'empty-icon' }, svgIcon('search')),
            h('div', { class: 'empty-title' }, S.searchQuery ? 'No results' : 'No memories yet'),
            h('div', { class: 'empty-sub' },
              S.searchQuery
                ? 'Try a different query or strategy.'
                : 'End a Claude session — observations are extracted automatically.'),
          ));
          return;
        }
        list.innerHTML = '';
        filtered.forEach((m) => list.append(memCard(m)));
      }

      function memCard(m) {
        const card = h('div', {
          class: 'mem-card fade-in' + (m.id === S.selectedId ? ' selected' : ''),
          onclick: () => selectMemory(m),
        });

        const kc = KIND_COLOR[m.kind] || KIND_COLOR.other;
        card.style.setProperty('--card-accent', kc.bg);
        if (m.id === S.selectedId) card.style.borderLeftColor = kc.bg;

        const forget = h('div', {
          class: 'mc-forget', title: 'Forget this memory',
          onclick: async (e) => {
            e.stopPropagation();
            if (!confirm('Remove this memory?')) return;
            await fetch('/api/memories/' + m.id, { method: 'DELETE' });
            S.data.memories = S.data.memories.filter((x) => x.id !== m.id);
            if (S.selectedId === m.id) { S.selectedId = null; hideDetail(); }
            buildKindFilters(S.data.memories);
            renderList(S.searchResults ?? S.data.memories);
            if (S.network) { try { S.network.getBody().data.nodes.remove(m.id); } catch {} }
            document.getElementById('s-mem').textContent = fmtK(S.data.memories.length);
          },
        }, '×');

        const head = h('div', { class: 'mc-head' },
          h('span', { class: 'mc-title' }, m.title),
          h('span', { class: 'mc-kind ' + kindClass(m.kind) }, (m.kind || 'other').replace('_', ' ')),
        );
        const preview = m.body ? h('div', { class: 'mc-body' }, m.body) : null;
        const tags = (m.tags || []).slice(0, 3).map((t) => h('span', { class: 'mc-tag' }, t));
        const footer = h('div', { class: 'mc-footer' },
          h('span', { class: 'mc-time' }, relTime(m.created_at)),
          h('div', { class: 'mc-tags' }, ...tags),
        );
        card.append(forget, head);
        if (preview) card.append(preview);
        card.append(footer);
        return card;
      }

      // ─── Detail panel ─────────────────────────────────────────────────────────────
      function selectMemory(m) {
        S.selectedId = m.id;
        renderList(S.searchResults ?? S.data?.memories ?? []);
        showDetail(m);
        if (S.network) {
          try {
            S.network.selectNodes([m.id]);
            S.network.focus(m.id, { animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
          } catch {}
        }
      }

      function showDetail(m) {
        const panel = document.getElementById('detail-panel');
        const inner = document.getElementById('detail-inner');
        panel.style.display = 'block';
        panel.style.animation = 'none';
        requestAnimationFrame(() => { panel.style.animation = ''; });

        const saved = m.tokens_saved ? fmtK(m.tokens_saved) + ' tk saved' : '';
        const spent = m.tokens_spent ? fmtK(m.tokens_spent) + ' tk spent' : '';
        const fileChips = (m.files || []).map((f) => {
          const short = f.split('/').slice(-2).join('/');
          return h('span', { class: 'detail-chip file', title: f }, short);
        });
        const tagChips = (m.tags || []).map((t) => h('span', { class: 'detail-chip' }, t));
        inner.innerHTML = '';
        inner.append(
          h('div', { class: 'detail-head' },
            h('span', { class: 'detail-title' }, m.title),
            h('span', { class: 'mc-kind ' + kindClass(m.kind) }, (m.kind || 'other').replace('_', ' ')),
            h('div', { class: 'detail-close', title: 'Close', onclick: () => {
              S.selectedId = null; hideDetail(); renderList(S.searchResults ?? S.data?.memories ?? []);
            }},
              h('svg', { width: '10', height: '10', viewBox: '0 0 10 10', fill: 'none', stroke: 'currentColor', 'stroke-width': '1.6', 'stroke-linecap': 'round' },
                h('path', { d: 'M1 1l8 8M9 1L1 9' }))
            ),
          ),
          h('div', { class: 'detail-meta' },
            h('span', {}, relTime(m.created_at)),
            saved ? h('span', { style: 'color:var(--accent-g)' }, saved) : null,
            spent ? h('span', {}, spent) : null,
          ),
          h('div', { class: 'detail-body' }, m.body || ''),
          fileChips.length || tagChips.length
            ? h('div', { class: 'detail-chips' }, ...fileChips, ...tagChips)
            : null,
        );
      }

      function hideDetail() {
        document.getElementById('detail-panel').style.display = 'none';
        if (S.network) { try { S.network.unselectAll(); } catch {} }
      }

      // ─── Search ────────────────────────────────────────────────────────────────────
      document.getElementById('search-input').addEventListener('input', (e) => {
        const q = e.target.value.trim();
        S.searchQuery = q;
        clearTimeout(S.debounce);
        if (!q) { S.searchResults = null; renderList(S.data?.memories ?? []); return; }
        S.debounce = setTimeout(() => runSearch(q), 320);
      });

      async function runSearch(q) {
        const spin = document.getElementById('search-spinner');
        spin.style.display = 'block';
        try {
          const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&strategy=${S.strategy}&k=20`);
          const json = await res.json();
          S.searchResults = json.results;
          document.getElementById('tab-hint').textContent = `${json.strategy} · ${json.results.length} results`;
          renderList(json.results);
        } catch {
          S.searchResults = null;
          renderList(S.data?.memories ?? []);
        } finally {
          spin.style.display = 'none';
        }
      }

      // ─── Tabs ─────────────────────────────────────────────────────────────────────
      function bindTabs() {
        document.querySelectorAll('.tab-btn[data-tab]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const t = btn.dataset.tab;
            S.activeTab = t;
            document.querySelectorAll('.tab-btn[data-tab]').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-graph').style.display = t === 'graph' ? 'flex' : 'none';
            document.getElementById('tab-analytics').style.display = t === 'analytics' ? 'flex' : 'none';
            if (t === 'analytics' && !S.analyticsRendered && S.fullStats) renderAnalytics(S.fullStats);
          });
        });
      }

      // ─── Knowledge graph ──────────────────────────────────────────────────────────
      function buildGraph({ nodes, edges }) {
        const container = document.getElementById('graph-container');
        if (!nodes?.length) {
          container.innerHTML =
            '<div class="empty" style="height:100%">' + svgIcon('graph').outerHTML +
            '<div class="empty-title">No graph yet</div>' +
            '<div class="empty-sub">Memories with shared files or tags appear here.</div></div>';
          return;
        }
        const vNodes = new vis.DataSet(nodes.map((n) => {
          const kc = KIND_COLOR[n.kind] || KIND_COLOR.other;
          return {
            id: n.id, label: n.label, title: n.title,
            color: { background: kc.bg, border: kc.border, highlight: { background: kc.bg, border: '#fff' } },
            font: { color: '#ede8da', size: 11, face: 'Syne' },
            shape: 'dot', size: 10, borderWidth: 1.5,
          };
        }));
        const vEdges = new vis.DataSet(edges.map((e, i) => ({
          id: i, from: e.from, to: e.to,
          color: { color: '#2d2918', highlight: '#f0a030', opacity: 0.9 },
          width: 1, smooth: { type: 'dynamic' },
        })));
        S.network = new vis.Network(
          container,
          { nodes: vNodes, edges: vEdges },
          {
            physics: { stabilization: { iterations: 100 }, barnesHut: { gravitationalConstant: -2000, springLength: 120 } },
            interaction: { hover: true, tooltipDelay: 200 },
            nodes: { borderWidthSelected: 2 },
          },
        );
        S.network.on('click', ({ nodes: selected }) => {
          if (!selected.length) return;
          const id = selected[0];
          const mem = S.data?.memories?.find((m) => m.id === id);
          if (mem) { S.selectedId = id; renderList(S.searchResults ?? S.data?.memories ?? []); showDetail(mem); }
        });
        document.getElementById('tab-hint').textContent = `${nodes.length} nodes · ${edges.length} edges`;
      }

      // ─── Full stats ────────────────────────────────────────────────────────────────
      async function loadFullStats() {
        try {
          const res = await fetch('/api/stats/full');
          S.fullStats = await res.json();
          const hit = S.fullStats.cache?.hit_rate;
          document.getElementById('s-cache').textContent = hit != null ? (hit * 100).toFixed(0) + '%' : '—';
          if (S.activeTab === 'analytics') renderAnalytics(S.fullStats);
        } catch {}
      }

      function renderAnalytics(fs) {
        S.analyticsRendered = true;
        const grid = document.getElementById('analytics-grid');
        grid.innerHTML = '';

        // 1. Kind breakdown
        const kb = fs.kindBreakdown || {};
        const kbMax = Math.max(...Object.values(kb).map(Number), 1);
        const kbCard = card('Memory kinds');
        Object.entries(kb).sort((a, b) => b[1] - a[1]).forEach(([kind, count]) => {
          const kc = KIND_COLOR[kind] || KIND_COLOR.other;
          const row = h('div', { class: 'bar-row' },
            h('span', { class: 'bar-label' }, kind.replace('_', ' ')),
            h('div', { class: 'bar-track' }, h('div', { class: 'bar-fill', style: `background:${kc.bg}` })),
            h('span', { class: 'bar-count' }, String(count)),
          );
          kbCard.append(row);
          requestAnimationFrame(() => { row.querySelector('.bar-fill').style.width = (count / kbMax) * 100 + '%'; });
        });
        if (!Object.keys(kb).length) kbCard.append(h('div', { class: 'empty' }, h('div', { class: 'empty-sub' }, 'No data yet')));
        grid.append(wrap(kbCard));

        // 2. Cache performance
        const cc = fs.cache || {};
        const cacheCard = card('Cache performance');
        [
          ['Hit rate', cc.hit_rate != null ? (cc.hit_rate * 100).toFixed(1) + '%' : '—', 'var(--accent-g)'],
          ['Hits',    cc.hit_count ?? 0,  'var(--accent-g)'],
          ['Misses',  cc.miss_count ?? 0, 'var(--muted2)'],
          ['Entries', cc.entry_count ?? 0, 'var(--accent-c)'],
        ].forEach(([lbl, val, color]) => {
          cacheCard.append(h('div', { class: 'cache-stat' },
            h('span', { class: 'cache-stat-lbl' }, lbl),
            h('span', { class: 'cache-stat-val', style: `color:${color}` }, String(val)),
          ));
        });
        grid.append(wrap(cacheCard));

        // 3. Retrieval usage
        const ru = fs.retrieval || [];
        const ruMax = Math.max(...ru.map((r) => r.call_count), 1);
        const ruCard = card('Retrieval strategy');
        ru.sort((a, b) => b.call_count - a.call_count).forEach((r) => {
          const row = h('div', { class: 'bar-row' },
            h('span', { class: 'bar-label' }, r.strategy),
            h('div', { class: 'bar-track' }, h('div', { class: 'bar-fill', style: 'background:var(--accent-v)' })),
            h('span', { class: 'bar-count' }, String(r.call_count)),
          );
          ruCard.append(row);
          requestAnimationFrame(() => { row.querySelector('.bar-fill').style.width = (r.call_count / ruMax) * 100 + '%'; });
        });
        if (!ru.length) ruCard.append(h('div', { class: 'empty' }, h('div', { class: 'empty-sub' }, 'No retrieval data yet')));
        grid.append(wrap(ruCard));

        // 4. Top files
        const tf = fs.topFiles || [];
        const tfCard = card('Top files referenced');
        tf.slice(0, 12).forEach((f) => {
          tfCard.append(h('div', { class: 'file-row' },
            h('span', { class: 'file-name', title: f.file_path }, f.file_path.split('/').slice(-2).join('/')),
            h('span', { class: 'file-count' }, String(f.reference_count) + 'x'),
          ));
        });
        if (!tf.length) tfCard.append(h('div', { class: 'empty' }, h('div', { class: 'empty-sub' }, 'No file references yet')));
        grid.append(wrap(tfCard));
      }

      function card(title) {
        const el = h('div', { class: 'a-card' });
        el.append(h('div', { class: 'a-title' }, title));
        return el;
      }
      function wrap(el) { const w = h('div', {}); w.append(el); return w; }

      // ─── SVG icons ────────────────────────────────────────────────────────────────
      function svgIcon(name) {
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        el.setAttribute('width', '32'); el.setAttribute('height', '32');
        el.setAttribute('viewBox', '0 0 24 24'); el.setAttribute('fill', 'none');
        el.setAttribute('stroke', 'currentColor'); el.setAttribute('stroke-width', '1.5');
        el.setAttribute('stroke-linecap', 'round'); el.classList.add('empty-icon');
        const paths = {
          search: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/>',
          graph: '<circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><path d="M7 11.5L17 6M7 12.5L17 18"/>',
        };
        el.innerHTML = paths[name] || '';
        return el;
      }

      // ─── Init ─────────────────────────────────────────────────────────────────────
      boot();
    </script>
  </body>
</html>
